<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body>
    <a-scene  vr-mode-ui="enabled: false" embedded arjs>
        <a-marker preset="hiro">
            <a-asset-item id="3D-model" src="https://fredlinnn.github.io/asset/gltf/tree.glb"></a-asset-item>
           <a-gltf-model src="#3D-model" position="0 0 0" scale="0.4 0.4 0.4" animation=" property:rotation;
                             dur:10000;
                             from:0 0 0;
                             to:0 360 0;
                             loop:-1;
                             easing:linear;
                             " shadow></a-gltf-model>
        </a-marker>
        <a-entity camera></a-entity>
       
    </a-scene>
</body>

</html>
