<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="https://glitch.com/favicon.ico" />
    <title>Merry Xmas 2022 by Yueh-Fang Lin</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/focus-visible@5.0.2/dist/focus-visible.js" defer></script>
</head>

<body>
    <div class="flexbox">
        <div class="rwd-content">
            <div class="rwd-content-left aspect-ratio">
                <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
                <model-viewer alt="Littlest Tokyo by glenatron" src="./assets/LittlestTokyo/LittlestTokyo.glb" ios-src="./assets/LittlestTokyo/LittlestTokyo.usdz" ar ar-modes="scene-viewer webxr quick-look" poster="./assets/LittlestTokyo/LittlestTokyo.webp" camera-orbit="45deg 75deg 2m" shadow-intensity="1" camera-controls disable-tap autoplay auto-rotate>

                    <button slot="ar-button" id="ar-button">
                        進入AR擴增實境</button>
                </model-viewer>
            </div>

            <div class="rwd-content-right aspect-ratio">
                <div>

                    <div>
                        <h1>祝福你聖誕快樂~</h1>
                    </div>

                    <div class="line2">
                        轉眼間今年就要過完了，感謝您對我的照顧，祝您有個平安、幸福的聖誕節!<br>這是我設計的小卡片，可以用AR玩看看喔~
                    </div>
                    <div class="line1">
                        <div class="me-content">
                            <div class="me"></div>Fred 林岳鋒
                        </div>
                    </div>

                </div>
            </div>
        </div>
        <div class="rwd-footer">
            <div class="copyright">
                Copyright&nbsp;©&nbsp;
                <script>
                    document.write(new Date().getFullYear());

                </script>
                &nbsp;Yueh-Fang Lin.&nbsp;All rights reserved.
            </div>
        </div>
    </div>
    <style>
        #ar-button {
            background-image: url(./assets/img/ic_view_in_ar_new_googblue_48dp.png);
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 20px 50%;
            background-color: #fff;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            bottom: 2.5em;
            padding: 0px 20px 0px 48px;
            font-family: SweiXDPearlCJKtc-Regular;
            font-size: 14px;
            color: #4285f4;
            height: 40px;
            line-height: 40px;
            border-radius: 99em;
            border: 0px solid #ffffff;
        }

        #ar-button:active {
            background-color: #E8EAED;
        }

    </style>
</body>

</html>
