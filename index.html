<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-extras.animation-mixer@3.4.0/dist/aframe-extras.animation-mixer.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item
          id="3D-model"
          src="https://fredlinnn.github.io/asset/gltf/tree.glb"
        ></a-asset-item>
      </a-assets>

      
      
      
      <a-gltf-model
        src="#3D-model"
        position="0 0 -7"
        scale="0.6 0.6 0.6"
        animation-mixer
        shadow
      ></a-gltf-model>
      <!--<a-entity
        id="ground"
        geometry="primitive: box; width: 20; height: 0.01; depth: 20"
        material="color: #eee;"
        position="0 0 0"
      ></a-entity>-->
      
        <a-light id="alight" type="ambient" color="#ffd4b3"></a-light>
  
       <a-light id="dlight" type="directional" color="#fff" intensity="0.5" position="-0.5 1 1" light="castShadow: true"></a-light>
    </a-scene>
  </body>
</html>
